<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #09090b, #18181b, #27272a);
        background-attachment: fixed;
        color: #e4e4e7;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      
      /* Glassmorphism base */
      .react-app-container {
        min-height: 100vh;
        background: rgba(24, 24, 27, 0.35);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Sick animated ambient glow in the background */
      body::before {
        content: '';
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 40%),
                    radial-gradient(circle at 80% 80%, rgba(16,185,129,0.1) 0%, transparent 40%);
        animation: ambientGlow 20s infinite alternate ease-in-out;
        z-index: -1;
      }

      @keyframes ambientGlow {
        0% { transform: scale(0.9) rotate(0deg); }
        100% { transform: scale(1.1) rotate(5deg); }
      }
    </style>
  </head>
  <body style="margin: 0">
    <div id="react-app" class="react-app-container"></div>
  </body>
</html>
